<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-sans);color:var(--fg1)}
  .wrap{padding:22px;display:flex;flex-direction:column;gap:8px}
  .row{display:flex;align-items:center;gap:14px}
  .lbl{width:48px;font-family:var(--font-mono);font-size:11px;color:var(--fg3)}
  .name{width:60px;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
  .bar{height:14px;background:#F5C400;border-left:2px solid #000;border-right:2px solid #000}
</style></head><body class="vp">
<div class="wrap">
  <div class="row"><span class="name">1</span><span class="lbl">4px</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="name">2</span><span class="lbl">8px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="name">3</span><span class="lbl">12px</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="name">4</span><span class="lbl">16px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="name">6</span><span class="lbl">24px</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="name">8</span><span class="lbl">32px</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="name">12</span><span class="lbl">48px</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="name">16</span><span class="lbl">64px</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="name">24</span><span class="lbl">96px</span><div class="bar" style="width:96px"></div></div>
</div>
</body></html>
