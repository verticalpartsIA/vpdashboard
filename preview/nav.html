<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="utf-8"><title>Nav</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-sans);color:var(--fg1)}
  .nav{height:80px;background:#000;color:#fff;display:flex;align-items:center;padding:0 28px;border-bottom:2px solid #F5C400;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px}
  .brand img{height:30px}
  .links{display:flex;gap:28px;align-items:center}
  .links a{color:#fff;text-decoration:none;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.14em}
  .links a:hover{color:#F5C400}
  .cta{background:#F5C400;color:#000;padding:10px 16px;font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.14em;text-decoration:none}
  .sub{padding:14px 28px;color:var(--fg3);font-size:12px;display:flex;gap:6px;font-family:var(--font-mono)}
  .crumb-sep{color:#F5C400}
</style></head><body class="vp">
<div class="nav">
  <div class="brand"><img src="../assets/logo-verticalparts-white.png" onerror="this.style.display='none'"/><span class="vp-wordmark" style="font-size:18px"><span style="color:#fff">VERTICAL</span><span class="vp-parts">PARTS</span></span></div>
  <div class="links"><a>Início</a><a>Catálogo</a><a>Equipamentos</a><a>Suporte</a><a class="cta">Área do Cliente →</a></div>
</div>
<div class="sub">início <span class="crumb-sep">/</span> escadas-rolantes <span class="crumb-sep">/</span> corrimão</div>
</body></html>
