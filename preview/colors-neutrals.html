<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="utf-8"><title>Colors — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-sans);color:var(--fg1)}
  .wrap{padding:24px}
  .row{display:grid;grid-template-columns:repeat(9,1fr);border:1px solid var(--border)}
  .cell{height:80px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-size:10px;font-family:var(--font-mono)}
  .cell .n{font-family:var(--font-sans);font-weight:800;letter-spacing:.1em;text-transform:uppercase;font-size:10px}
  .lbl{margin-top:14px;font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--fg3)}
</style></head><body class="vp">
<div class="wrap">
  <div class="lbl" style="margin-top:0;margin-bottom:8px">Grayscale ramp · used for surfaces, dividers and metadata</div>
  <div class="row">
    <div class="cell" style="background:#F9F9F9;color:#000"><span class="n">50</span><span>#F9F9F9</span></div>
    <div class="cell" style="background:#F2F2F2;color:#000"><span class="n">100</span><span>#F2F2F2</span></div>
    <div class="cell" style="background:#E5E5E5;color:#000"><span class="n">200</span><span>#E5E5E5</span></div>
    <div class="cell" style="background:#C9C9C9;color:#000"><span class="n">300</span><span>#C9C9C9</span></div>
    <div class="cell" style="background:#A0A0A0;color:#000"><span class="n">400</span><span>#A0A0A0</span></div>
    <div class="cell" style="background:#808080;color:#fff"><span class="n">500</span><span>#808080</span></div>
    <div class="cell" style="background:#4A4A4A;color:#fff"><span class="n">700</span><span>#4A4A4A</span></div>
    <div class="cell" style="background:#1F1F1F;color:#fff"><span class="n">900</span><span>#1F1F1F</span></div>
    <div class="cell" style="background:#000;color:#fff"><span class="n">Ink</span><span>#000000</span></div>
  </div>
</div>
</body></html>
