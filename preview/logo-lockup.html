<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="utf-8"><title>Logo Lockup</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;font-family:var(--font-sans)}
  .wrap{display:grid;grid-template-columns:1fr 1fr;min-height:200px}
  .light{background:#fff;display:flex;align-items:center;justify-content:center;padding:24px;border-right:1px solid var(--border)}
  .dark{background:#000;display:flex;align-items:center;justify-content:center;padding:24px}
  .light img,.dark img{max-width:80%;max-height:140px}
</style></head><body class="vp">
<div class="wrap">
  <div class="light"><img src="../assets/logo-verticalparts-color.png" alt="Vertical Parts color logo"/></div>
  <div class="dark"><img src="../assets/logo-verticalparts-white.png" alt="Vertical Parts white logo"/></div>
</div>
</body></html>
