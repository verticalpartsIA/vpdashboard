<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-sans);color:var(--fg1)}
  .wrap{padding:24px;display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:80px;height:80px;background:var(--vp-black);border:2px solid var(--vp-yellow)}
  .lbl{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
  .v{font-family:var(--font-mono);font-size:10px;color:var(--fg3)}
</style></head><body class="vp">
<div class="wrap">
  <div class="item"><div class="box" style="border-radius:0"></div><div class="lbl">none</div><div class="v">0</div></div>
  <div class="item"><div class="box" style="border-radius:2px"></div><div class="lbl">xs</div><div class="v">2px</div></div>
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="lbl">sm</div><div class="v">4px</div></div>
  <div class="item"><div class="box" style="border-radius:6px"></div><div class="lbl">md</div><div class="v">6px</div></div>
  <div class="item"><div class="box" style="border-radius:10px"></div><div class="lbl">lg</div><div class="v">10px</div></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><div class="lbl">pill</div><div class="v">999px</div></div>
</div>
</body></html>
